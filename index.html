<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مركز قيادة مازن 🚀</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --accent-hover: #2980b9; --training: #27ae60;
            --bg-color: #ecf0f1; --card-bg: #ffffff; --text: #2c3e50;
            --success: #27ae60; --error: #c0392b; --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body { font-family: var(--font-main); background: var(--bg-color); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; border-top: 6px solid var(--accent); max-height: 95vh; overflow-y: auto; }
        h1 { margin-bottom: 0.5rem; color: var(--primary); }
        h2 { font-size: 1.2rem; color: #7f8c8d; font-weight: normal; margin-top: 0; }

        .progress-grid { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-bottom: 20px; direction: ltr; }
        .prog-block { width: 12px; height: 12px; background: #ddd; border-radius: 3px; transition: 0.3s; }
        .prog-block.correct { background: var(--success); }
        .prog-block.wrong { background: var(--error); }
        .prog-block.active { border: 1px solid #666; transform: scale(1.4); background: var(--accent); }

        select, input[type="text"] { width: 100%; padding: 12px; font-size: 1.2rem; border-radius: 6px; border: 2px solid #bdc3c7; margin: 15px 0; outline: none; box-sizing: border-box; text-align: center; direction: rtl; }
        input[type="text"]:focus { border-color: var(--accent); }

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 24px; font-size: 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn:hover { background: var(--accent-hover); }
        .btn-train { background: var(--training); } .btn-train:hover { background: #219150; }
        .btn-retry { background: var(--error); } .btn-retry:hover { background: #a93226; }

        #target-display { font-family: var(--font-main); font-size: 2.5rem; color: var(--training); margin: 10px 0; font-weight: bold; background: #f0fdf4; padding: 10px; border-radius: 8px; border: 1px dashed var(--training); }
        #mode-indicator { background: #2c3e50; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .hidden { display: none !important; }
        .result-list { list-style: none; padding: 0; text-align: right; max-height: 250px; overflow-y: auto; border-top: 1px solid #eee; }
        .result-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size:1.2rem;}
        
        /* VIRTUAL KEYBOARD */
        #keyboard-container { background: #f4f4f9; padding: 15px 5px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd; direction: ltr; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
        .kb-key { background: white; border: 1px solid #ccc; border-radius: 4px; padding: 10px 0; font-size: 1.2rem; font-weight: bold; color: #333; cursor: pointer; flex-grow: 1; max-width: 40px; }
        .kb-key:active { background: #e0e0e0;}
        .kb-special { font-size: 1rem; min-width: 60px; max-width: none; background: #e2e8f0; }
        .btn-toggle-kb { background: transparent; color: #7f8c8d; border: 1px dashed #ccc; padding: 5px 15px; border-radius: 6px; cursor: pointer; margin-bottom:10px;}
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>مركز قيادة مازن</h1>
        <h2>وحدة التدريب على التهجئة</h2>
        
        <label style="display:block; text-align:right; font-weight:bold; color:#7f8c8d; margin-top:20px;">البيانات المستهدفة (الصف):</label>
        <select id="grade-select">
            <option value="4">الصف الرابع</option>
            <option value="5" selected>الصف الخامس</option>
            <option value="6">الصف السادس</option>
            <option value="7">الصف السابع</option>
            <option value="8">الصف الثامن</option>
            <option value="all">جميع الصفوف (مختلط)</option>
        </select>

        <label style="display:block; text-align:right; font-weight:bold; color:#7f8c8d;">طول الجلسة:</label>
        <select id="count-select">
            <option value="10">١٠ كلمات (تسخين)</option>
            <option value="25" selected>٢٥ كلمة (قياسي)</option>
            <option value="50">٥٠ كلمة (مكثف)</option>
        </select>
        
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
            <button class="btn btn-train" onclick="startGame('practice')">🟢 تفعيل بروتوكول التدريب</button>
            <button class="btn" onclick="startGame('test')">🔵 تفعيل بروتوكول الاختبار</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div style="text-align:center;"><span id="mode-indicator">TEST MODE</span></div>
        <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:#7f8c8d; margin-bottom:10px;">
            <span>الكلمة: <strong id="current-count">1</strong></span>
            <span>النتيجة: <strong id="score-display">0</strong></span>
        </div>

        <div id="progress-grid" class="progress-grid"></div>
        <div id="target-display" class="hidden">الكلمة</div>

        <div class="btn-group">
            <button class="btn" style="flex: 0 0 100px;" onclick="speakCurrentWord()">🔊 استمع</button>
        </div>

        <div id="status-msg" style="height:20px; font-size:0.9rem; color:#7f8c8d; margin-bottom:5px;"></div>

        <input type="text" id="user-input" placeholder="في انتظار الإدخال..." autocomplete="off">
        
        <button class="btn-toggle-kb" onclick="toggleKeyboard()">⌨️ لوحة المفاتيح</button>
        
        <div id="keyboard-container" class="hidden">
            <div class="kb-row">
                <button class="kb-key" onclick="typeChar('ض')">ض</button><button class="kb-key" onclick="typeChar('ص')">ص</button>
                <button class="kb-key" onclick="typeChar('ث')">ث</button><button class="kb-key" onclick="typeChar('ق')">ق</button>
                <button class="kb-key" onclick="typeChar('ف')">ف</button><button class="kb-key" onclick="typeChar('غ')">غ</button>
                <button class="kb-key" onclick="typeChar('ع')">ع</button><button class="kb-key" onclick="typeChar('ه')">ه</button>
                <button class="kb-key" onclick="typeChar('خ')">خ</button><button class="kb-key" onclick="typeChar('ح')">ح</button>
                <button class="kb-key" onclick="typeChar('ج')">ج</button><button class="kb-key" onclick="typeChar('د')">د</button>
            </div>
            <div class="kb-row">
                <button class="kb-key" onclick="typeChar('ش')">ش</button><button class="kb-key" onclick="typeChar('س')">س</button>
                <button class="kb-key" onclick="typeChar('ي')">ي</button><button class="kb-key" onclick="typeChar('ب')">ب</button>
                <button class="kb-key" onclick="typeChar('ل')">ل</button><button class="kb-key" onclick="typeChar('ا')">ا</button>
                <button class="kb-key" onclick="typeChar('ت')">ت</button><button class="kb-key" onclick="typeChar('ن')">ن</button>
                <button class="kb-key" onclick="typeChar('م')">م</button><button class="kb-key" onclick="typeChar('ك')">ك</button>
                <button class="kb-key" onclick="typeChar('ط')">ط</button>
            </div>
            <div class="kb-row">
                <button class="kb-key" onclick="typeChar('ئ')">ئ</button><button class="kb-key" onclick="typeChar('ء')">ء</button>
                <button class="kb-key" onclick="typeChar('ؤ')">ؤ</button><button class="kb-key" onclick="typeChar('ر')">ر</button>
                <button class="kb-key" onclick="typeChar('ى')">ى</button><button class="kb-key" onclick="typeChar('ة')">ة</button>
                <button class="kb-key" onclick="typeChar('و')">و</button><button class="kb-key" onclick="typeChar('ز')">ز</button>
                <button class="kb-key" onclick="typeChar('ظ')">ظ</button><button class="kb-key" onclick="typeChar('أ')">أ</button>
                <button class="kb-key" onclick="typeChar('إ')">إ</button><button class="kb-key" onclick="typeChar('ذ')">ذ</button>
            </div>
            <div class="kb-row">
                <button class="kb-key kb-special" onclick="typeChar('space')">مسافة</button>
                <button class="kb-key kb-special" style="background:#e74c3c; color:white; border:none;" onclick="typeChar('backspace')">⌫ مسح</button>
            </div>
        </div>

        <button class="btn" onclick="submitWord()" style="margin-top:10px;">تأكيد الإدخال</button>
    </div>

    <div id="result-screen" class="hidden">
        <h1>اكتملت الجلسة</h1>
        <p style="font-size:1.2rem;">النتيجة: <strong id="final-score">0</strong> / <span id="final-total">0</span></p>
        
        <div id="perfect-message" class="hidden" style="color:var(--success); font-weight:bold; margin:20px 0;">أداء مثالي. دقة 100%.</div>
        
        <div id="mistake-area" class="hidden">
            <button class="btn btn-retry" onclick="startDrillMode()" style="margin-bottom:20px;">⚠ تفعيل بروتوكول المراجعة (الأخطاء)</button>
            <h3 style="text-align:right;">تحليل الأخطاء:</h3>
            <ul id="mistake-list" class="result-list"></ul>
        </div>

        <button class="btn" onclick="resetGame()" style="margin-top:20px; background:#95a5a6;">العودة للرئيسية</button>
    </div>
</div>

<script>

    ];

    function normalizeArabic(text) {
        if(!text) return "";
        return text.replace(/[\u064B-\u065F\u0670]/g, '').trim();
    }

    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text); u.lang = 'ar-SA'; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    let sessionWords = [], currentIndex = 0, wrongAnswers = [], score = 0, currentMode = 'test', practiceReps = 0;

    function toggleKeyboard() { document.getElementById('keyboard-container').classList.toggle('hidden'); }
    function typeChar(char) {
        const input = document.getElementById('user-input');
        if (char === 'backspace') input.value = input.value.slice(0, -1);
        else if (char === 'space') input.value += ' ';
        else input.value += char;
        input.focus();
    }

    function startGame(mode) {
        currentMode = mode; currentIndex = 0; score = 0; practiceReps = 0; wrongAnswers = []; initAudio();
        const indicator = document.getElementById('mode-indicator');
        const targetDisplay = document.getElementById('target-display');
        
        if(mode === 'drill') {
            indicator.innerText = "⚠ بروتوكول المراجعة"; indicator.style.background = "#c0392b";
            targetDisplay.classList.add('hidden');
        } else if (mode === 'practice') {
            indicator.innerText = "🟢 بروتوكول التدريب"; indicator.style.background = "#27ae60";
            targetDisplay.classList.remove('hidden');
        } else {
            indicator.innerText = "🔵 بروتوكول الاختبار"; indicator.style.background = "#2980b9";
            targetDisplay.classList.add('hidden');
        }

        if (mode !== 'drill') {
            const gradeSelect = document.getElementById('grade-select').value;
            const countSelect = parseInt(document.getElementById('count-select').value);
            
            let pool = WORD_DATA.filter(item => {
                if (gradeSelect === 'all') return true;
                return item.g == gradeSelect;
            });
            
            if(pool.length === 0) return alert("لا توجد بيانات لهذا المستوى في النظام حالياً.");
            pool.sort(() => Math.random() - 0.5);
            sessionWords = pool.slice(0, countSelect);
        }

        document.getElementById('final-total').innerText = sessionWords.length;
        document.getElementById('score-display').innerText = "0";
        setupProgressGrid(); switchScreen('game-screen'); setTimeout(loadWord, 500);
    }

    function startDrillMode() {
        let drillPool = [];
        wrongAnswers.forEach(item => { drillPool.push(item, item, item); });
        drillPool.sort(() => Math.random() - 0.5); sessionWords = drillPool;
        startGame('drill');
    }

    function setupProgressGrid() {
        const grid = document.getElementById('progress-grid'); grid.innerHTML = '';
        sessionWords.forEach((_, index) => {
            const block = document.createElement('div'); block.className = 'prog-block'; block.id = `block-${index}`;
            grid.appendChild(block);
        });
    }

    function updateBlockStatus(index, status) {
        const block = document.getElementById(`block-${index}`);
        if(block) { block.classList.remove('active', 'correct', 'wrong'); block.classList.add(status); }
    }

    function loadWord() {
        document.getElementById('user-input').value = ''; document.getElementById('user-input').focus();
        document.getElementById('current-count').innerText = currentIndex + 1;
        document.getElementById('status-msg').innerText = '';
        
        if(currentMode === 'practice') {
            document.getElementById('target-display').innerText = sessionWords[currentIndex].w;
            document.getElementById('status-msg').innerText = "مطلوب تكرار الإدخال (٣ مرات)";
            practiceReps = 0;
        }
        updateBlockStatus(currentIndex, 'active'); speakCurrentWord();
    }

    function speakCurrentWord() { speak(sessionWords[currentIndex].w); }

    function submitWord() {
        const inputRaw = document.getElementById('user-input').value;
        const targetRaw = sessionWords[currentIndex].w;
        const inputNormal = normalizeArabic(inputRaw);
        const targetNormal = normalizeArabic(targetRaw);
        const status = document.getElementById('status-msg');

        if (inputNormal === targetNormal && inputNormal.length > 0) {
            if(currentMode === 'practice') {
                practiceReps++;
                document.getElementById('user-input').value = '';
                if (practiceReps < 3) {
                    status.innerText = `تم المطابقة. متبقي ${3 - practiceReps} محاولات.`; status.style.color = "var(--training)";
                    return; 
                } else {
                    score++; document.getElementById('score-display').innerText = score;
                    updateBlockStatus(currentIndex, 'correct'); status.innerText = "اكتمل التسلسل. التالي.";
                }
            } else {
                score++; document.getElementById('score-display').innerText = score;
                updateBlockStatus(currentIndex, 'correct');
            }
        } else {
            status.style.color = "var(--error)";
            if(currentMode === 'practice') {
                status.innerText = "خطأ في المطابقة. يرجى التحقق من الهدف."; return; 
            } else {
                wrongAnswers.push({ w: targetRaw, g: sessionWords[currentIndex].g, attempt: inputRaw });
                updateBlockStatus(currentIndex, 'wrong');
            }
        }

        currentIndex++;
        if (currentIndex < sessionWords.length) setTimeout(loadWord, 1000);
        else setTimeout(showResults, 1000);
    }

    function showResults() {
        document.getElementById('final-score').innerText = score;
        const list = document.getElementById('mistake-list'); list.innerHTML = '';
        const mistakeArea = document.getElementById('mistake-area');
        const perfectMsg = document.getElementById('perfect-message');

        if (currentMode === 'practice') {
            mistakeArea.classList.add('hidden'); perfectMsg.classList.remove('hidden');
            perfectMsg.innerText = "اكتمل التدريب. تم تشفير البيانات في الذاكرة.";
        } else if (wrongAnswers.length === 0) {
            mistakeArea.classList.add('hidden'); perfectMsg.classList.remove('hidden');
        } else {
            perfectMsg.classList.add('hidden'); mistakeArea.classList.remove('hidden');
            const uniqueMap = new Map();
            wrongAnswers.forEach(item => { if(!uniqueMap.has(item.w)) uniqueMap.set(item.w, item); });
            uniqueMap.forEach(item => {
                const li = document.createElement('li'); li.className = 'result-item';
                li.innerHTML = `<span style="font-weight:bold; color:var(--primary);">${item.w}</span><span style="color:#aaa; text-decoration:line-through">${item.attempt || "..."}</span>`;
                list.appendChild(li);
            });
        }
        switchScreen('result-screen');
    }

    function resetGame() { switchScreen('start-screen'); }
    function switchScreen(id) {
        ['start-screen', 'game-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    document.getElementById('user-input').addEventListener("keypress", function(event) { if (event.key === "Enter") submitWord(); });
</script>
</body>
</html>
